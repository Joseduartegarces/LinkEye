<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GazeType - Clon Look to Speak</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker/face_landmarker.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --bg-color: #000;
            --text-color: #fff;
            --accent-color: #2196F3;
            --highlight: #ffeb3b;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Pantalla de visualización de texto */
        #display-area {
            height: 25%;
            border-bottom: 2px solid var(--accent-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            background: #111;
        }

        #current-phrase {
            font-size: 1.8rem;
            min-height: 2.2rem;
            color: var(--highlight);
            text-align: center;
        }

        #predictions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .word-pill {
            background: var(--accent-color);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        /* Paneles de Interacción */
        #interaction-container {
            flex: 1;
            display: flex;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid #333;
            transition: background 0.2s;
        }

        .panel.active {
            background: #222;
            border: 4px solid var(--accent-color);
        }

        .letter-grid {
            font-size: 3rem;
            font-weight: bold;
            text-align: center;
            word-spacing: 15px;
            pointer-events: none;
        }

        /* Video oculto para el tracking */
        #video-container {
            position: fixed;
            top: 0;
            right: 0;
            width: 120px;
            height: 90px;
            opacity: 0.7;
            z-index: 100;
        }

        video { transform: scaleX(-1); width: 100%; height: 100%; border-radius: 8px; }

        .status-dot {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: red;
            position: absolute;
            top: 5px;
            left: 5px;
        }
    </style>
</head>
<body>

<div id="video-container">
    <video id="webcam" autoplay playsinline></video>
    <div id="status" class="status-dot"></div>
</div>

<div id="display-area">
    <div id="current-phrase">...</div>
    <div id="predictions" id="prediction-row">
        </div>
</div>

<div id="interaction-container">
    <div id="left-panel" class="panel">
        <div class="letter-grid" id="left-text">A B C D E F G<br>H I J K L M</div>
    </div>
    <div id="right-panel" class="panel">
        <div class="letter-grid" id="right-text">N O P Q R S T<br>U V W X Y Z</div>
    </div>
</div>

<script>
    const leftPanel = document.getElementById('left-panel');
    const rightPanel = document.getElementById('right-panel');
    const display = document.getElementById('current-phrase');
    const predictionRow = document.getElementById('predictions');
    
    let phrase = "";
    let currentOptions = "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ ".split("");
    let workingSet = [...currentOptions];

    // --- LÓGICA DE SELECCIÓN TIPO LOOK TO SPEAK ---
    
    function updatePanels() {
        if (workingSet.length === 1) {
            const char = workingSet[0];
            if (char === " ") phrase += " ";
            else phrase += char;
            
            display.innerText = phrase || "...";
            resetSelection();
            speak(char);
            updatePredictions();
            return;
        }

        const mid = Math.ceil(workingSet.length / 2);
        const leftSet = workingSet.slice(0, mid);
        const rightSet = workingSet.slice(mid);

        document.getElementById('left-text').innerText = leftSet.join(" ");
        document.getElementById('right-text').innerText = rightSet.join(" ");
    }

    function selectSide(side) {
        const mid = Math.ceil(workingSet.length / 2);
        if (side === 'left') {
            workingSet = workingSet.slice(0, mid);
        } else {
            workingSet = workingSet.slice(mid);
        }
        updatePanels();
    }

    function resetSelection() {
        workingSet = [...currentOptions];
        updatePanels();
    }

    // --- TEXTO PREDICTIVO SIMPLE ---
    const dictionary = ["HOLA", "NECESITO", "AYUDA", "DOLOR", "AGUA", "HAMBRE", "GRACIAS", "QUIERO", "BAÑO", "AIRE"];
    
    function updatePredictions() {
        predictionRow.innerHTML = "";
        const lastWord = phrase.split(" ").pop().toUpperCase();
        if (lastWord.length < 1) return;

        const matches = dictionary.filter(w => w.startsWith(lastWord)).slice(0, 3);
        matches.forEach(word => {
            const btn = document.createElement('div');
            btn.className = "word-pill";
            btn.innerText = word;
            // En un sistema real, el usuario miraría ARRIBA para elegir predicciones
            predictionRow.appendChild(btn);
        });
    }

    // --- VOZ ---
    function speak(text) {
        const ut = new SpeechSynthesisUtterance(text);
        ut.lang = 'es-ES';
        window.speechSynthesis.speak(ut);
    }

    // --- TRACKING OCULAR (SIMULADO PARA DEMO / REQUIERE MEDIAPIPE) ---
    // En una implementación real, aquí conectarías Face Landmarker 
    // y detectarías el ratio de apertura de ojos y dirección de pupila.
    
    let gazeLock = false;
    window.addEventListener('keydown', (e) => {
        if (e.key === "ArrowLeft") selectSide('left');
        if (e.key === "ArrowRight") selectSide('right');
        if (e.key === "Enter") {
            speak(phrase);
            phrase = "";
            display.innerText = "...";
        }
        if (e.key === "Backspace") {
            phrase = phrase.slice(0, -1);
            display.innerText = phrase || "...";
            resetSelection();
        }
    });

    // Inicializar
    updatePanels();
</script>
</body>
</html>
